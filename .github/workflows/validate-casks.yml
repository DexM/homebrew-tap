name: Validate Casks

on:
  - push

jobs:
  validate-cask:
    name: Validate Cask "${{ matrix.cask }}"
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        cask:
          - apple-container
          - docker-desktop

    env:
      TAP: ${{ github.repository }}
      CASK: ${{ github.repository }}/${{ matrix.cask }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Update Homebrew
        run: brew update --verbose

      - name: Turn On Developer Mode
        run: brew developer on --verbose

      - name: Create Local Tap
        run: |
          mkdir -p "$(brew --repository "$TAP")"
          cp -R . "$(brew --repository "$TAP")"

      - name: Trust Local Tap
        run: brew trust --tap --verbose "$TAP"

      - name: Check Style
        run: brew style --cask --verbose "$CASK"

      - name: Audit Cask
        run: brew audit --strict --cask --verbose "$CASK"

      - name: Install Cask
        run: brew install --cask --verbose "$CASK"

      - name: Uninstall Cask
        run: brew uninstall --cask --zap --verbose "$CASK"
